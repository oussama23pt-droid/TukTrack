<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="format-detection" content="telephone=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="TukTrack">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src *; img-src * data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://api.mapbox.com https://apis.google.com https://www.gstatic.com https://*.firebaseapp.com https://*.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com; font-src 'self' https://fonts.gstatic.com; worker-src 'self' blob:;">
    <meta name="theme_color" content="#0f172a">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png">
    <meta name="apple-mobile-web-app-title" content="TukTrack">
    <title>TukTrack - Gestão de Frotas Inteligente</title>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://js.stripe.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>
      // Connection retry logic
      (function() {
        var maxRetries = 3;
        var retryInterval = 3000;
        var retryCount = parseInt(sessionStorage.getItem('tt_load_retries') || '0');

        function checkLoad() {
          if (!window.tt_loaded && retryCount < maxRetries) {
            console.log('App failed to load, retrying... (' + (retryCount + 1) + '/' + maxRetries + ')');
            sessionStorage.setItem('tt_load_retries', (retryCount + 1).toString());
            setTimeout(function() {
              window.location.reload();
            }, retryInterval);
          } else if (!window.tt_loaded && retryCount >= maxRetries) {
            var loader = document.getElementById('root-loading');
            if (loader) {
              loader.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                  <div style="color: #ef4444; font-size: 40px; margin-bottom: 20px;">⚠️</div>
                  <h3 style="color: white; font-family: sans-serif; margin-bottom: 10px;">Erro de Inicialização</h3>
                  <p style="color: #94a3b8; font-family: sans-serif; font-size: 14px; margin-bottom: 20px; line-height: 1.5;">
                    Não foi possível carregar a aplicação.isto pode dever-se a:<br>
                    • Ligação à internet lenta ou instável<br>
                    • DNS do domínio personalizado ainda em propagação<br>
                    • Bloqueio de Firewall ou VPN
                  </p>
                  <button onclick="sessionStorage.setItem('tt_load_retries', '0'); window.location.reload();" 
                    style="background: #f59e0b; color: #0f172a; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; tracking: 0.1em;">
                    Tentar Novamente
                  </button>
                </div>
              `;
            }
          }
        }

        window.addEventListener('load', function() {
          // Give it a bit more time to initialize components
          setTimeout(function() {
            if (!window.tt_app_ready) checkLoad();
          }, 20000); // Increased to 20 seconds for slow initial Firestore handshakes
        });
      })();
    </script>
    <style>
      #root-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        z-index: 9999;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-left-color: #f59e0b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loading-text {
        margin-top: 16px;
        color: #94a3b8;
        font-family: sans-serif;
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loading">
        <div class="spinner"></div>
        <div class="loading-text">TukTrack</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
