name: Build Android APK + AAB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          NODE_ENV: production
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}

      - name: Backup android build files before cap sync
        run: |
          cp android/build.gradle /tmp/root-build.gradle.bak
          cp android/app/build.gradle /tmp/app-build.gradle.bak

      - name: Capacitor sync
        run: npx cap sync android

      - name: Restore build files after cap sync
        run: |
          cp /tmp/root-build.gradle.bak android/build.gradle
          cp /tmp/app-build.gradle.bak android/app/build.gradle

      - name: Fix Gradle wrapper jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Generate app icons
        run: |
          pip install pillow --quiet
          echo "" | base64 -d > /tmp/gen_icons.py
          python3 /tmp/gen_icons.py

      - name: Patch drawable references
        run: |
          for FILE in android/app/src/main/java/com/tuktrack/app/MainActivity.kt android/app/src/main/java/com/tuktrack/app/LocationForegroundService.kt; do
            if [ -f "$FILE" ]; then
              sed -i 's/R\.drawable\.[a-zA-Z_]*/R.drawable.ic_stat_icon/g' "$FILE"
            fi
          done

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Build release AAB
        run: cd android && ./gradlew bundleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TukTrack-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: TukTrack-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
