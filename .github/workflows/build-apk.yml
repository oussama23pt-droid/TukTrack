name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          NODE_ENV: production
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}

      - name: Capacitor sync
        run: npx cap sync android

      - name: Fix Gradle wrapper jar
        run: |
          cd android
          mkdir -p gradle/wrapper
          curl -fL -o /tmp/gradle-8.4-bin.zip \
            https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Generate app icons and ic_stat_icon drawable
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          pip install pillow --quiet

          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          base = "android/app/src/main/res"

          # Launcher icons - use blue tuk-tuk from public folder
          src_path = "public/pwa-512x512.png"
          if not os.path.exists(src_path):
              src_path = "public/pwa-192x192.png"
          if os.path.exists(src_path):
              src_img = Image.open(src_path).convert("RGBA")
          else:
              src_img = Image.new("RGBA", (512,512), (30,100,220,255))

          for folder, size in [("mipmap-mdpi",48),("mipmap-hdpi",72),("mipmap-xhdpi",96),("mipmap-xxhdpi",144),("mipmap-xxxhdpi",192)]:
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)
              img = src_img.resize((size, size), Image.LANCZOS)
              img.save(os.path.join(path, "ic_launcher.png"))
              img.save(os.path.join(path, "ic_launcher_round.png"))
              img.save(os.path.join(path, "ic_launcher_foreground.png"))


          # Notification icon â€” white on transparent (Android requirement)
          for folder, size in [("drawable-mdpi",24),("drawable-hdpi",36),("drawable-xhdpi",48),("drawable-xxhdpi",72),("drawable-xxxhdpi",96)]:
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)
              img = Image.new("RGBA", (size, size), (0,0,0,0))
              m = size // 6
              ImageDraw.Draw(img).ellipse([m, m, size-m-1, size-m-1], fill=(255,255,255,255))
              img.save(os.path.join(path, "ic_stat_icon.png"))

          # Also create default drawable folder with ic_stat_icon
          path = os.path.join(base, "drawable")
          os.makedirs(path, exist_ok=True)
          img = Image.new("RGBA", (48, 48), (0,0,0,0))
          ImageDraw.Draw(img).ellipse([6, 6, 41, 41], fill=(255,255,255,255))
          img.save(os.path.join(path, "ic_stat_icon.png"))
          print("All icons generated successfully")
          PYEOF

      - name: Inject Foreground Service and BootReceiver
        run: |
          PKG_DIR="android/app/src/main/java/com/tuktrack/app"
          mkdir -p "$PKG_DIR"

          # ── LocationForegroundService.kt ─────────────────────────────────────
          cat > "$PKG_DIR/LocationForegroundService.kt" << 'KOTLIN'
package com.tuktrack.app

import android.app.*
import android.content.Context
import android.content.Intent
import android.content.pm.ServiceInfo
import android.location.Location
import android.location.LocationListener
import android.location.LocationManager
import android.os.Build
import android.os.Bundle
import android.os.IBinder
import android.util.Log
import androidx.core.app.NotificationCompat

class LocationForegroundService : Service() {
    companion object {
        const val TAG = "TukTrackFGService"
        const val CHANNEL_ID = "tuktrack_foreground_location"
        const val NOTIF_ID = 1001
        const val ACTION_START = "com.tuktrack.app.START_LOCATION"
        const val ACTION_STOP = "com.tuktrack.app.STOP_LOCATION"
        fun start(context: Context) {
            val i = Intent(context, LocationForegroundService::class.java).apply { action = ACTION_START }
            if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) context.startForegroundService(i)
            else context.startService(i)
        }
        fun stop(context: Context) {
            context.stopService(Intent(context, LocationForegroundService::class.java))
        }
    }
    private var locationManager: LocationManager? = null
    private var locationListener: LocationListener? = null
    override fun onCreate() { super.onCreate(); createNotificationChannel() }
    override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
        if (intent?.action == ACTION_STOP) {
            stopLocationUpdates(); stopForeground(STOP_FOREGROUND_REMOVE); stopSelf()
            return START_NOT_STICKY
        }
        val notif = buildNotification()
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q)
            startForeground(NOTIF_ID, notif, ServiceInfo.FOREGROUND_SERVICE_TYPE_LOCATION)
        else startForeground(NOTIF_ID, notif)
        startLocationUpdates()
        return START_STICKY
    }
    private fun buildNotification(): Notification {
        val pi = PendingIntent.getActivity(this, 0,
            Intent(this, MainActivity::class.java).apply {
                flags = Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_CLEAR_TOP },
            PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)
        return NotificationCompat.Builder(this, CHANNEL_ID)
            .setContentTitle("TukTrack - Em Servico")
            .setContentText("A partilhar localizacao em tempo real. Toque para abrir.")
            .setSmallIcon(R.drawable.ic_stat_icon)
            .setOngoing(true).setAutoCancel(false)
            .setPriority(NotificationCompat.PRIORITY_MAX)
            .setCategory(NotificationCompat.CATEGORY_SERVICE)
            .setContentIntent(pi)
            .setVisibility(NotificationCompat.VISIBILITY_PUBLIC)
            .build()
    }
    private fun createNotificationChannel() {
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
            val ch = NotificationChannel(CHANNEL_ID, "TukTrack Location", NotificationManager.IMPORTANCE_LOW)
            ch.description = "Location running while driver is online"
            ch.setShowBadge(true)
            getSystemService(NotificationManager::class.java).createNotificationChannel(ch)
        }
    }
    private fun startLocationUpdates() {
        try {
            locationManager = getSystemService(LOCATION_SERVICE) as LocationManager
            locationListener = object : LocationListener {
                override fun onLocationChanged(loc: Location) {
                    sendBroadcast(Intent("com.tuktrack.app.LOCATION_UPDATE").apply {
                        putExtra("lat", loc.latitude); putExtra("lng", loc.longitude)
                        putExtra("accuracy", loc.accuracy)
                    })
                }
                override fun onStatusChanged(p: String?, s: Int, e: Bundle?) {}
                override fun onProviderEnabled(p: String) {}
                override fun onProviderDisabled(p: String) {}
            }
            locationManager?.requestLocationUpdates(LocationManager.GPS_PROVIDER, 5000L, 10f, locationListener!!)
            locationManager?.requestLocationUpdates(LocationManager.NETWORK_PROVIDER, 5000L, 10f, locationListener!!)
        } catch (e: SecurityException) { Log.e(TAG, "No location permission: ${e.message}") }
    }
    private fun stopLocationUpdates() {
        locationListener?.let { locationManager?.removeUpdates(it) }
        locationManager = null; locationListener = null
    }
    override fun onBind(intent: Intent?): IBinder? = null
    override fun onDestroy() { stopLocationUpdates(); super.onDestroy() }
    override fun onTaskRemoved(rootIntent: Intent?) {
        val pi = PendingIntent.getService(applicationContext, 1,
            Intent(applicationContext, LocationForegroundService::class.java).apply { action = ACTION_START },
            PendingIntent.FLAG_ONE_SHOT or PendingIntent.FLAG_IMMUTABLE)
        (getSystemService(ALARM_SERVICE) as AlarmManager).set(AlarmManager.ELAPSED_REALTIME, 1000L, pi)
        super.onTaskRemoved(rootIntent)
    }
}
KOTLIN

          # ── BootReceiver.kt ──────────────────────────────────────────────────
          cat > "$PKG_DIR/BootReceiver.kt" << 'KOTLIN'
package com.tuktrack.app

import android.content.BroadcastReceiver
import android.content.Context
import android.content.Intent

class BootReceiver : BroadcastReceiver() {
    override fun onReceive(context: Context, intent: Intent) {
        if (intent.action == Intent.ACTION_BOOT_COMPLETED) {
            val prefs = context.getSharedPreferences("tuktrack_prefs", Context.MODE_PRIVATE)
            if (prefs.getBoolean("driver_online", false)) {
                LocationForegroundService.start(context)
            }
        }
    }
}
KOTLIN

          echo "Kotlin files injected"

          # ── Patch AndroidManifest.xml to add service + permissions ───────────
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Add permissions before <application tag
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
    <uses-permission android:name="android.permission.WAKE_LOCK" />
    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />|' "$MANIFEST"

            # Add service and receiver before </application>
            sed -i 's|</application>|        <service android:name=".LocationForegroundService" android:foregroundServiceType="location" android:exported="false" android:stopWithTask="false" />
        <receiver android:name=".BootReceiver" android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.BOOT_COMPLETED" />
            </intent-filter>
        </receiver>
    </application>|' "$MANIFEST"
            echo "AndroidManifest.xml patched"
          fi

      - name: Patch all Kotlin files to use ic_stat_icon
        run: |
          # Replace any R.drawable.* reference in our Kotlin files with ic_stat_icon
          for FILE in \
            android/app/src/main/java/com/tuktrack/app/MainActivity.kt \
            android/app/src/main/java/com/tuktrack/app/LocationForegroundService.kt \
            android/app/src/main/java/com/tuktrack/app/ForegroundLocationService.kt; do
            if [ -f "$FILE" ]; then
              sed -i 's/android\.R\.drawable\.[a-zA-Z_]*/R.drawable.ic_stat_icon/g' "$FILE"
              sed -i 's/R\.drawable\.[a-zA-Z_]*/R.drawable.ic_stat_icon/g' "$FILE"
              echo "Patched: $FILE"
            fi
          done

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TukTrack-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
