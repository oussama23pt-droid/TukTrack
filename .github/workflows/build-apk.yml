name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          NODE_ENV: production
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}

      - name: Capacitor sync
        run: npx cap sync android

      - name: Fix Gradle wrapper jar
        run: |
          cd android
          mkdir -p gradle/wrapper
          curl -fL -o /tmp/gradle-8.4-bin.zip https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Generate app icons
        run: |
          pip install pillow --quiet
          echo "" | base64 -d > /tmp/gen_icons.py
          python3 /tmp/gen_icons.py

      - name: Patch drawable references
        run: |
          for FILE in android/app/src/main/java/com/tuktrack/app/MainActivity.kt android/app/src/main/java/com/tuktrack/app/LocationForegroundService.kt; do
            if [ -f "$FILE" ]; then
              sed -i 's/R\.drawable\.[a-zA-Z_]*/R.drawable.ic_stat_icon/g' "$FILE"
            fi
          done

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TukTrack-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
