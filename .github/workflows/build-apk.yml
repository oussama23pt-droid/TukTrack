name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Capacitor sync
        run: npx cap sync android

      - name: Fix Gradle wrapper jar
        run: |
          cd android
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar

      - name: Generate missing app icons
        run: |
          sudo apt-get install -y imagemagick
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            dir="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            size=48
            [ "$density" = "hdpi" ]    && size=72
            [ "$density" = "xhdpi" ]   && size=96
            [ "$density" = "xxhdpi" ]  && size=144
            [ "$density" = "xxxhdpi" ] && size=192
            convert -size ${size}x${size} xc:#0f172a \
              -fill '#f59e0b' -draw "circle $((size/2)),$((size/2)) $((size/2)),4" \
              "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_foreground.png"
          done

      - name: Create missing drawable resource
        run: |
          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/ic_stat_icon_default.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
            <path
                android:fillColor="#FFFFFF"
                android:pathData="M12,2C8.13,2 5,5.13 5,9c0,5.25 7,13 7,13s7,-7.75 7,-13c0,-3.87 -3.13,-7 -7,-7zM12,11.5c-1.38,0 -2.5,-1.12 -2.5,-2.5s1.12,-2.5 2.5,-2.5 2.5,1.12 2.5,2.5 -1.12,2.5 -2.5,2.5z"/>
          </vector>
          EOF

      - name: Fix ForegroundLocationService drawable reference
        run: |
          FILE="android/app/src/main/java/com/tuktrack/app/ForegroundLocationService.kt"
          if [ -f "$FILE" ]; then
            # Replace any R.drawable.* reference with the one we created
            sed -i 's/R\.drawable\.[a-zA-Z_]*/R.drawable.ic_stat_icon_default/g' "$FILE"
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TukTrack-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: TukTrack ${{ github.ref_name }}
          body: |
            ## TukTrack ${{ github.ref_name }}
            Download the APK below and install it on your Android device.
            > Enable "Install from unknown sources" in Settings if needed.
