name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore tuktrack-upload.jks \
            -alias tuktrack \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=TukTrack App, OU=TukTrack, O=TukTrack, L=City, S=State, C=US" \
            -storepass tuktrack2024 \
            -keypass tuktrack2024

      - name: Convert to base64
        run: base64 -w 0 tuktrack-upload.jks > keystore_b64.txt

      - name: Upload keystore files
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            tuktrack-upload.jks
            keystore_b64.txt
          retention-days: 1
