name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android platform and build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create missing mipmap and drawable icon folders
        run: |
          pip install pillow --quiet
          python3 - <<'PYEOF'
          from PIL import Image, ImageDraw
          import os

          base = "android/app/src/main/res"

          # ── 1. App launcher icons (coloured blue circle) ──────────────────────
          launcher_sizes = {
            "mipmap-mdpi":    48,
            "mipmap-hdpi":    72,
            "mipmap-xhdpi":   96,
            "mipmap-xxhdpi":  144,
            "mipmap-xxxhdpi": 192,
          }
          for folder, size in launcher_sizes.items():
            path = os.path.join(base, folder)
            os.makedirs(path, exist_ok=True)
            img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
            draw = ImageDraw.Draw(img)
            draw.ellipse([0, 0, size-1, size-1], fill=(37, 99, 235, 255))
            img.save(os.path.join(path, "ic_launcher.png"))
            img.save(os.path.join(path, "ic_launcher_round.png"))
            print(f"Created {folder}/ic_launcher.png ({size}x{size})")

          # ── 2. Notification status-bar icon (white on transparent) ────────────
          # Android requires notification small icons to be white/grey on transparent.
          # We create ic_stat_icon in drawable folders for all densities.
          notif_sizes = {
            "drawable-mdpi":    24,
            "drawable-hdpi":    36,
            "drawable-xhdpi":   48,
            "drawable-xxhdpi":  72,
            "drawable-xxxhdpi": 96,
          }
          for folder, size in notif_sizes.items():
            path = os.path.join(base, folder)
            os.makedirs(path, exist_ok=True)
            # White circle on transparent background
            img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
            draw = ImageDraw.Draw(img)
            margin = size // 8
            draw.ellipse(
              [margin, margin, size-margin-1, size-margin-1],
              fill=(255, 255, 255, 255)
            )
            img.save(os.path.join(path, "ic_stat_icon.png"))
            print(f"Created {folder}/ic_stat_icon.png ({size}x{size})")

          PYEOF

      - name: Install Gradle and generate wrapper
        run: |
          curl -fL -o /tmp/gradle-8.4-bin.zip \
            https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/gradle-dist
          cd android
          /tmp/gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TukTrack-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
