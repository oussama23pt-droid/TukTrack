name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android platform and build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install Gradle and generate wrapper
        run: |
          # Download the official Gradle 8.4 distribution
          curl -fL -o /tmp/gradle-8.4-bin.zip \
            https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/gradle-dist

          # Use it to regenerate gradle-wrapper.jar inside the android folder
          cd android
          /tmp/gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ls -lh gradle/wrapper/

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TukTrack-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
