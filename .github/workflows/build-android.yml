name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java (required by Android build tools) ──────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install dependencies ────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 6. Build web assets (Vite) ─────────────────────────────────────────
      #   This produces the dist/ folder that Capacitor copies into the APK.
      #   CRITICAL: No VITE_SERVER_URL or localhost URLs should be set here.
      - name: Build web app
        run: npm run build
        env:
          NODE_ENV: production
          # Add your VITE_ env vars as GitHub Secrets and reference them here:
          # VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      # ── 7. Sync Capacitor (copies dist/ → android/app/src/main/assets/public)
      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. Make Gradle wrapper executable ─────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Build debug APK ─────────────────────────────────────────────────
      #   Use assembleDebug for quick testing; use assembleRelease + signing for production.
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 10. Upload APK as artifact ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TukTrack-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. (Optional) Create GitHub Release with APK on tag push ──────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: TukTrack ${{ github.ref_name }}
          body: |
            ## TukTrack ${{ github.ref_name }}
            Download the APK below and install it on your Android device.
            > Enable "Install from unknown sources" in Settings if needed.
