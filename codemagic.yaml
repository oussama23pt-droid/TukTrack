workflows:
  android-release:
    name: TukTrack Android Release (AAB)
    max_build_duration: 60
    environment:
      android_signing:
        - tuktrack
      node: 18
      java: 17
      vars:
        PACKAGE_NAME: "com.tuktrack.app"

    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set executable permission on gradlew
        script: chmod +x android/gradlew

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - your@email.com          # change to your email
        notify:
          success: true
          failure: true
